<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Research-Paper-Analyser</title>
    <!-- Use Inter for sleek tech UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #151A28;
            --accent-glow: #10B981;
            --accent-hover: #059669;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --border-subtle: #374151;
            --glass-bg: rgba(21, 26, 40, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 2em;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #10B981, #34D399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .section-card:hover {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .section-title {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .section-title i {
            color: var(--accent-glow);
        }

        /* Upload Section */
        .upload-area {
            border: 2px dashed var(--border-subtle);
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-glow);
            background: rgba(16, 185, 129, 0.05);
        }

        .upload-area i {
            font-size: 4em;
            color: var(--text-secondary);
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .upload-area:hover i {
            color: var(--accent-glow);
        }

        .upload-area p {
            font-size: 1.1em;
            color: var(--text-secondary);
        }

        .progress-container {
            margin-top: 25px;
            height: 6px;
            background: var(--bg-main);
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: var(--accent-glow);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Topic Selection */
        .controls-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-glow);
        }

        button {
            background: var(--accent-glow);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        /* Summary */
        .summary-content {
            font-size: 1.05em;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .summary-content h2, .summary-content h3, .summary-content h4 {
            color: var(--text-primary);
            margin: 25px 0 15px 0;
        }

        .summary-content ul, .summary-content ol {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .summary-content li {
            margin-bottom: 8px;
        }

        /* Chat Section */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 500px;
        }

        .chat-messages {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95em;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-user {
            align-self: flex-end;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .chat-ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            font-family: 'Fira Code', monospace; /* Tech feel for AI response */
        }

        .chat-message i {
            margin-right: 8px;
            opacity: 0.7;
        }

        .chat-input-area {
            display: flex;
            gap: 15px;
        }

        .chat-input-area input {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-area input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9em;
            border-top: 1px solid var(--border-subtle);
            margin-top: auto;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI-Research-Paper-Analyser</h1>
    </header>

    <main>
        <!-- Upload Section -->
        <div class="section-card" id="uploadSection">
            <div class="section-title"><i class="fa-solid fa-cloud-arrow-up"></i> Document Ingestion</div>
            <div class="upload-area" id="uploadCard">
                <i class="fa-regular fa-file-pdf"></i>
                <p>Drag & Drop your research paper PDF here<br>or click to browse</p>
            </div>
            <input type="file" id="pdfFile" accept=".pdf" style="display:none;">
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <!-- Topic Selection Section -->
        <div class="section-card hidden" id="topicSection">
            <div class="section-title"><i class="fa-solid fa-list-check"></i> Extracted Sections</div>
            <div class="controls-group">
                <select id="topicSelect"></select>
                <button onclick="showTopicSummary()"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Summary</button>
            </div>
        </div>

        <!-- Summary Section -->
        <div class="section-card hidden" id="summarySection">
            <div class="section-title"><i class="fa-solid fa-microscope"></i> AI Analysis & Summary</div>
            <div class="summary-content" id="summaryContent"></div>
        </div>

        <!-- Chat Section -->
        <div class="section-card hidden" id="chatSection">
            <div class="section-title"><i class="fa-solid fa-network-wired"></i> Neural Query Interface</div>
            <div class="chat-container">
                <div class="chat-messages" id="chatBox">
                    <!-- Messages will appear here -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Initialize query about the document..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i> Transmit</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        Abhi &copy; 2025 AI-Research-Paper-Analyser
    </footer>

    <script>
        let topics = {};
        const uploadCard = document.getElementById('uploadCard');
        const fileInput = document.getElementById('pdfFile');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        
        const topicSection = document.getElementById('topicSection');
        const topicSelect = document.getElementById('topicSelect');
        
        const summarySection = document.getElementById('summarySection');
        const summaryContent = document.getElementById('summaryContent');
        
        const chatSection = document.getElementById('chatSection');
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');

        uploadCard.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFile);

        uploadCard.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadCard.classList.add('dragover');
        });

        uploadCard.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadCard.classList.remove('dragover');
        });

        uploadCard.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadCard.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFile(); 
        });

        function handleFile() {
            const file = fileInput.files[0];
            if(!file) return;
            
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            topicSection.classList.add('hidden');
            summarySection.classList.add('hidden');
            chatSection.classList.add('hidden');

            // Simulate progress while uploading
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += 5;
                    progressBar.style.width = width + '%';
                }
            }, 500);

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    clearInterval(interval);
                    progressBar.style.width = '100%';
                    
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        topicSelect.innerHTML = '';
                        if (data.topics && data.topics.length > 0) {
                            data.topics.forEach(t => {
                                let opt = document.createElement('option');
                                opt.value = t;
                                opt.innerText = t;
                                topicSelect.appendChild(opt);
                            });
                            topicSection.classList.remove('hidden');
                            
                            // Scroll to topic section smoothly
                            topicSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 500);
                })
                .catch(err => {
                    clearInterval(interval);
                    console.error("Upload error:", err);
                    alert("Error uploading file. Please try again.");
                    progressContainer.style.display = 'none';
                });
        }

        function formatSummary(text) {
            return text
                .replace(/^### (.*$)/gim, '<h4>$1</h4>')
                .replace(/^## (.*$)/gim, '<h3>$1</h3>')
                .replace(/^# (.*$)/gim, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^- (.*$)/gim, '<ul><li>$1</li></ul>')
                .replace(/^\d+\. (.*$)/gim, '<ol><li>$1</li></ol>')
                .replace(/<\/ul>\n<ul>/g, '\n')
                .replace(/<\/ol>\n<ol>/g, '\n')
                .replace(/\n\n/g, '<br><br>');
        }

        function showTopicSummary(){
            const topic = topicSelect.value;
            
            // Show loading state
            summaryContent.innerHTML = '<p style="color: var(--accent-glow);"><i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing section...</p>';
            summarySection.classList.remove('hidden');
            
            fetch('/summary', {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({topic})
            })
            .then(res=>res.json())
            .then(data=>{
              const raw = data.summary || "No summary available.";
              summaryContent.innerHTML = formatSummary(raw);
              chatSection.classList.remove('hidden');
              chatBox.innerHTML = '';
              
              // Scroll to chat
              setTimeout(() => {
                  chatSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }, 100);
            })
            .catch(err => {
                console.error("Summary error:", err);
                summaryContent.innerHTML = '<p style="color: #EF4444;">Error generating summary.</p>';
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendChat();
            }
        }

        function sendChat(){
            const msg = chatInput.value.trim();
            if(!msg) return;
          
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message chat-user';
            userMsg.innerHTML = `<i class="fa-solid fa-user"></i> ${msg}`;
            chatBox.appendChild(userMsg);

            chatBox.scrollTop = chatBox.scrollHeight;
            chatInput.value = '';
            
            // Add thinking indicator
            const aiThinking = document.createElement('div');
            aiThinking.className = 'chat-message chat-ai';
            aiThinking.id = 'ai-thinking';
            aiThinking.innerHTML = `<i class="fa-solid fa-robot"></i> <i class="fa-solid fa-ellipsis fa-fade"></i>`;
            chatBox.appendChild(aiThinking);
            chatBox.scrollTop = chatBox.scrollHeight;
          
            fetch('/chat', {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({message: msg})
            })
            .then(res=>res.json())
            .then(data=>{
                // Remove thinking indicator
                const thinkingEl = document.getElementById('ai-thinking');
                if (thinkingEl) thinkingEl.remove();

                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-message chat-ai';
                aiMsg.innerHTML = `<i class="fa-solid fa-robot"></i> ${data.response.replace(/\n/g, '<br>')}`;
                chatBox.appendChild(aiMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                const thinkingEl = document.getElementById('ai-thinking');
                if (thinkingEl) thinkingEl.remove();
                
                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-message chat-ai';
                aiMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Error processing query.`;
                aiMsg.style.color = '#EF4444';
                chatBox.appendChild(aiMsg);
            });
        }
    </script>
</body>
</html>
